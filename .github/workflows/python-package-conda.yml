  # This workflow will install the dependencies and run tests with pytest.

  name: Python package (conda)

  on:
    push:
      branches:
        - main
    pull_request:
      branches:
        - main

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up Miniconda
          uses: msys2/setup-msys2@v0.5.0

        - name: Install dependencies
          run: | 
            conda env create -f environment.yml
            conda activate myenv

        - name: Test with pytest
          run: |
            pytest || rc=$?; if [ $rc -eq 5 ]; then echo "No tests collected, allowing to pass."; exit 0; else exit $rc; fi

        - name: Upload coverage
          run: coverage xml
          continue-on-error: true
